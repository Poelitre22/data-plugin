<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Financial Data Tools</title>
    <meta name="description" content="Professional financial data analysis tools and plugins">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f7f9fc;
            color: #333;
        }
        header {
            background-color: #1a4f8a;
            color: white;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        h1 {
            margin-top: 0;
            font-size: 28px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .card {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 20px;
            flex: 1;
            min-width: 300px;
        }
        .card h2 {
            color: #1a4f8a;
            font-size: 20px;
            margin-top: 0;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
        }
        .stat-box {
            text-align: center;
            padding: 10px;
            background-color: #f1f7fe;
            border-radius: 4px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #1a4f8a;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        button {
            background-color: #1a4f8a;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover {
            background-color: #0d3658;
        }
        .chart-container {
            height: 200px;
            position: relative;
            margin-top: 15px;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #4CAF50;
            color: white;
            padding: 15px 20px;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Financial Data Analysis Platform</h1>
        <p>Professional-grade tools for financial data processing and visualization</p>
    </header>
    
    <div class="container">
        <div class="card">
            <h2>Market Overview</h2>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value">$2,847.32</div>
                    <div class="stat-label">NASDAQ</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">+1.47%</div>
                    <div class="stat-label">Change</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">1.2B</div>
                    <div class="stat-label">Volume</div>
                </div>
            </div>
            <button id="refreshData">Refresh Data</button>
            <div class="chart-container">
                <canvas id="marketChart"></canvas>
            </div>
        </div>
        
        <div class="card">
            <h2>Portfolio Performance</h2>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value">$124,382</div>
                    <div class="stat-label">Total Value</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">+12.8%</div>
                    <div class="stat-label">YTD Return</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">14</div>
                    <div class="stat-label">Holdings</div>
                </div>
            </div>
            <button id="updatePortfolio">Update Analysis</button>
            <div class="chart-container">
                <canvas id="portfolioChart"></canvas>
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification">
        Financial data plugin loaded successfully!
    </div>
    
    <!-- This is where we'll load our JavaScript file -->
    <script src="FinancialDataPlugin.js"></script>
</body>
</html>
